        - left:
            iscontext: true
            value:
              simple: KoiContext.alert_type
          operator: isEqualString
          right:
            value:
              simple: Publisher Compromised
        - left:
            iscontext: true
            value:
              simple: KoiContext.alert_type
          operator: isEqualString
          right:
            value:
              simple: Unvetted MCP Server
        - left:
            iscontext: true
            value:
              simple: KoiContext.risk_level
          operator: isEqualString
          right:
            value:
              simple: High
        - left:
            iscontext: true
            value:
              simple: KoiContext.risk_level
          operator: isEqualString
          right:
            value:
              simple: Critical
        - left:
