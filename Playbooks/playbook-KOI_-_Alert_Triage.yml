            iscontext: true
            value:
              simple: KoiContext.alert_type
          operator: isEqualString
          right:
            value:
              simple: New Item
      - - left:
            iscontext: true
            value:
              simple: KoiContext.risk_level
          operator: isEqualString
          right:
            value:
              simple: Low
