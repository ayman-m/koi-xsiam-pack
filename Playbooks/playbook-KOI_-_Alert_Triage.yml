id: KOI - Alert Triage
version: -1
fromversion: 6.10.0
name: KOI - Alert Triage
description: |-
  Triages a KOI alert end to end: extracts the embedded KOI context, enriches
  the flagged item against the KOI catalog (koi-koidex-risk-report), computes a
  verdict (Benign / Suspicious / Malicious) from the KOI alert type and the
  independent catalog risk level, posts a triage summary, and routes — auto-
  closing clearly-benign alerts and escalating the rest for analyst review.

  Designed to run as the attached playbook on KOI alerts ingested into Cortex
  XSIAM (source koi). Reads the koi_context JSON the collector embeds in the
  alert description.
