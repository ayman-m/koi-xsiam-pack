id: KOI - Enrich Item
version: -1
fromversion: 6.10.0
name: KOI - Enrich Item
description: |-
  Reusable enrichment for a KOI catalog item: pulls the KOI catalog risk and
  compliance report (koi-koidex-risk-report) and the endpoints on which the item
  is installed (koi-inventory-item-endpoints-list), and aggregates them into a
  compact KoiEnrichment object (risk level/score, endpoint count, hostnames) plus
  a markdown summary.

  Both enrichment calls are best-effort (continue-on-error): if the KOI API is
  unreachable, the playbook still returns whatever it could gather.
starttaskid: "0"
tasks:
  "0":
    id: "0"
    taskid: koienr00-0000-4000-8000-000000000000
    type: start
    task:
      id: koienr00-0000-4000-8000-000000000000
      version: -1
      name: ""
      iscommand: false
      brand: ""
      type: start
    nexttasks:
      '#none#':
      - "1"
    separatecontext: false
    continueonerrortype: ""
    view: |-
      {
        "position": {
          "x": 450,
          "y": 50
        }
      }
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  "1":
    id: "1"
    taskid: koienr00-0000-4000-8000-000000000001
    type: regular
    task:
      id: koienr00-0000-4000-8000-000000000001
      version: -1
      name: Get KOI catalog risk report
      description: Retrieves the KOI catalog risk and compliance report for the item.
      iscommand: true
      brand: ""
      script: '|||koi-koidex-risk-report'
      type: regular
    scriptarguments:
      item_id:
        simple: ${inputs.item_id}
      marketplace:
        simple: ${inputs.marketplace}
      using:
        simple: ${inputs.instance_name}
    nexttasks:
      '#error#':
      - "2"
      '#none#':
      - "2"
    separatecontext: false
    continueonerror: true
    continueonerrortype: errorPath
    view: |-
      {
        "position": {
          "x": 450,
          "y": 200
        }
      }
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  "2":
    id: "2"
    taskid: koienr00-0000-4000-8000-000000000002
    type: regular
    task:
      id: koienr00-0000-4000-8000-000000000002
      version: -1
      name: Get endpoints with the item installed
      description: Retrieves the endpoints on which the item is installed.
      iscommand: true
      brand: ""
      script: '|||koi-inventory-item-endpoints-list'
      type: regular
    scriptarguments:
      item_id:
        simple: ${inputs.item_id}
      marketplace:
        simple: ${inputs.marketplace}
      version:
        simple: ${inputs.version}
      limit:
        simple: "200"
      using:
        simple: ${inputs.instance_name}
    nexttasks:
      '#error#':
      - "3"
      '#none#':
      - "3"
    separatecontext: false
    continueonerror: true
    continueonerrortype: errorPath
    view: |-
      {
        "position": {
          "x": 450,
          "y": 370
        }
      }
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  "3":
    id: "3"
    taskid: koienr00-0000-4000-8000-000000000003
    type: regular
    task:
      id: koienr00-0000-4000-8000-000000000003
      version: -1
      name: Aggregate endpoint exposure
      description: Records how many endpoints have the item and their hostnames.
      iscommand: false
      brand: ""
      script: SetAndHandleEmpty
      type: regular
    scriptarguments:
      key:
        simple: KoiEnrichment.hostnames
      value:
        complex:
          root: Koi.Inventory.Endpoint
          accessor: hostname
          transformers:
          - operator: uniq
      append:
        simple: "false"
    nexttasks:
      '#none#':
