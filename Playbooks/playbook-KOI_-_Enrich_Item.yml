    type: regular
    task:
      id: koienr00-0000-4000-8000-000000000006
      version: -1
      name: Record catalog risk score
      description: Set a value in context under the key you entered.
      iscommand: false
      brand: ""
      script: SetAndHandleEmpty
      type: regular
    scriptarguments:
      key:
        simple: KoiEnrichment.risk_score
      value:
        simple: ${Koi.KoidexRiskReport.risk}
      append:
