inputs:
- key: item_id
  value: {}
  required: true
  description: The KOI catalog item ID (extension/package/MCP identifier).
  playbookInputQuery: null
- key: marketplace
  value: {}
  required: true
  description: The item's marketplace (chrome_web_store, npm, vscode, docker, ...).
  playbookInputQuery: null
- key: version
  value: {}
  required: false
  description: The item version (optional; narrows the endpoint lookup).
  playbookInputQuery: null
- key: instance_name
  value:
    simple: KOI_PAET
  required: false
  description: The KOI integration instance to use for the enrichment commands.
  playbookInputQuery: null
outputs:
- contextPath: KoiEnrichment.risk_level
  description: The KOI catalog risk level for the item.
  type: string
- contextPath: KoiEnrichment.risk_score
  description: The KOI catalog numeric risk score.
  type: number
- contextPath: KoiEnrichment.endpoint_count
  description: Number of endpoints on which the item is installed.
  type: number
- contextPath: KoiEnrichment.hostnames
  description: Hostnames of endpoints on which the item is installed.
  type: unknown
- contextPath: KoiEnrichment.summary
  description: Markdown enrichment summary.
  type: string
- contextPath: Koi.KoidexRiskReport
  description: The full KOI catalog risk report.
  type: unknown
tags:
- koi
quiet: false
