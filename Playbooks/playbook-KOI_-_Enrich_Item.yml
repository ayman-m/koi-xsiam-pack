    task:
      id: koienr00-0000-4000-8000-000000000004
      version: -1
      name: Record endpoint count
      description: Set a value in context under the key you entered.
      iscommand: false
      brand: ""
      script: SetAndHandleEmpty
      type: regular
    scriptarguments:
      key:
        simple: KoiEnrichment.endpoint_count
