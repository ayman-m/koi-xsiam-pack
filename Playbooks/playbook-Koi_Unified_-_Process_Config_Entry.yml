id: Koi Unified - Process Config Entry
version: -1
fromversion: 6.10.0
name: Koi Unified - Process Config Entry
description: |-
  Processes a single "Koi Script Runner" configuration entry: validates it
  (reporting invalid entries instead of silently skipping them), honors the
  per-entry disabled flag, executes the script via "Koi Unified - Execute
  Endpoint Script", and sends an optional email notification with the outcome.
starttaskid: "0"
tasks:
  "0":
    id: "0"
    taskid: c0ffee02-0000-4000-8000-000000000000
    type: start
    task:
      id: c0ffee02-0000-4000-8000-000000000000
      version: -1
      name: ""
      iscommand: false
      brand: ""
      type: start
    nexttasks:
      '#none#':
      - "21"
    separatecontext: false
    continueonerrortype: ""
    view: |-
      {
        "position": {
          "x": 480,
          "y": 50
        }
      }
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  "21":
    id: "21"
    taskid: c0ffee02-0000-4000-8000-000000000021
    type: regular
    task:
      id: c0ffee02-0000-4000-8000-000000000021
      version: -1
      name: Reset iteration context
      description: Clears leftover context from the previous loop iteration (loop iterations share the sub-playbook context).
      iscommand: false
      brand: ""
      script: DeleteContext
      type: regular
    scriptarguments:
      all:
        simple: "yes"
      subplaybook:
        simple: auto
    nexttasks:
      '#none#':
      - "1"
    separatecontext: false
    continueonerror: true
    continueonerrortype: ""
    view: |-
      {
        "position": {
          "x": 480,
          "y": 220
        }
      }
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  "1":
    id: "1"
    taskid: c0ffee02-0000-4000-8000-000000000001
    type: condition
    task:
      id: c0ffee02-0000-4000-8000-000000000001
      version: -1
      name: Is the config entry disabled?
      description: Entries with "disabled" set to true are skipped.
      iscommand: false
      brand: ""
      type: condition
    conditions:
    - label: "yes"
      condition:
      - - left:
            iscontext: true
            value:
              simple: inputs.config_entry.disabled
          operator: isTrue
          right:
            value: {}
    nexttasks:
      '#default#':
      - "2"
      "yes":
      - "11"
    separatecontext: false
    continueonerrortype: ""
    view: |-
      {
        "position": {
          "x": 480,
          "y": 405
        }
      }
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  "2":
    id: "2"
    taskid: c0ffee02-0000-4000-8000-000000000002
    type: condition
    task:
      id: c0ffee02-0000-4000-8000-000000000002
      version: -1
      name: Is the config entry valid?
      description: 'Required: script.name or script.uuid, target.endpoint_os, and at least one of target.endpoint_groups / target.endpoint_hostnames.'
      iscommand: false
      brand: ""
      type: condition
    conditions:
    - label: "yes"
      condition:
      - - left:
            iscontext: true
            value:
              simple: inputs.config_entry.script.name
          operator: isNotEmpty
          right:
            value: {}
        - left:
            iscontext: true
            value:
              simple: inputs.config_entry.script.uuid
          operator: isNotEmpty
          right:
            value: {}
      - - left:
            iscontext: true
            value:
              simple: inputs.config_entry.target.endpoint_os
          operator: isNotEmpty
          right:
            value: {}
      - - left:
            iscontext: true
            value:
              simple: inputs.config_entry.target.endpoint_groups
          operator: isNotEmpty
          right:
            value: {}
        - left:
            iscontext: true
            value:
              simple: inputs.config_entry.target.endpoint_hostnames
          operator: isNotEmpty
          right:
            value: {}
