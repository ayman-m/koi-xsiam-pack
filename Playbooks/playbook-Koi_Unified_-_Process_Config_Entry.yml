      version: -1
      name: Report invalid config entry
      description: Prints an error entry with a given message.
      iscommand: false
      brand: ""
      script: PrintErrorEntry
      type: regular
    scriptarguments:
      message:
        simple: 'Koi Script Runner: skipping an invalid configuration entry. Each entry requires script.name (or script.uuid), target.endpoint_os, and target.endpoint_groups or target.endpoint_hostnames. Entry: ${inputs.config_entry}'
    nexttasks:
      '#none#':
      - "11"
    separatecontext: false
    continueonerror: true
    continueonerrortype: ""
    view: |-
      {
        "position": {
          "x": 850,
          "y": 560
