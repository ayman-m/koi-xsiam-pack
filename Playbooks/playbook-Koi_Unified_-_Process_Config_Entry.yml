    taskid: c0ffee02-0000-4000-8000-000000000005
    type: condition
    task:
      id: c0ffee02-0000-4000-8000-000000000005
      version: -1
      name: Was the script run successful?
      description: Routes to the success or failure notification message.
      iscommand: false
      brand: ""
      type: condition
    conditions:
    - label: "yes"
      condition:
      - - left:
            iscontext: true
            value:
              simple: ScriptResult.ok
          operator: isTrue
          right:
            value: {}
    nexttasks:
      '#default#':
      - "7"
      "yes":
      - "6"
    separatecontext: false
    continueonerrortype: ""
    view: |-
      {
        "position": {
          "x": 450,
          "y": 740
        }
      }
