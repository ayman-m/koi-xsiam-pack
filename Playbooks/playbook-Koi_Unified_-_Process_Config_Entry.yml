    taskid: c0ffee02-0000-4000-8000-000000000004
    type: playbook
    task:
      id: c0ffee02-0000-4000-8000-000000000004
      version: -1
      name: Execute the endpoint script
      description: Executes the configured script on the targeted endpoints.
      playbookId: Koi Unified - Execute Endpoint Script
      iscommand: false
      brand: ""
      type: playbook
    scriptarguments:
      script_name:
        simple: ${inputs.config_entry.script.name}
      script_uuid:
        simple: ${inputs.config_entry.script.uuid}
      endpoint_os:
        simple: ${inputs.config_entry.target.endpoint_os}
      endpoint_groups:
        simple: ${inputs.config_entry.target.endpoint_groups}
      endpoint_hostnames:
        simple: ${inputs.config_entry.target.endpoint_hostnames}
      polling_interval_in_seconds:
        simple: ${inputs.config_entry.script.polling_interval_in_seconds}
      timeout_in_seconds:
        simple: ${inputs.config_entry.script.timeout_in_seconds}
      max_endpoints:
        simple: ${inputs.config_entry.target.max_endpoints}
    loop:
      iscommand: false
      exitCondition: ""
      max: 100
      wait: 1
    nexttasks:
      '#none#':
      - "24"
    separatecontext: true
    continueonerrortype: ""
    view: |-
      {
        "position": {
          "x": 807,
          "y": 775
        }
      }
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  "24":
    id: "24"
    taskid: c0ffee02-0000-4000-8000-000000000024
    type: condition
    task:
      id: c0ffee02-0000-4000-8000-000000000024
      version: -1
      name: Was the entry skipped (no matching endpoints)?
      description: A skipped entry is not an error — it means no connected endpoints currently match the target filters. No notification is sent.
      iscommand: false
      brand: ""
      type: condition
    conditions:
    - label: "yes"
      condition:
      - - left:
            iscontext: true
            value:
              simple: ScriptResult.skipped
          operator: isTrue
          right:
            value: {}
    nexttasks:
      '#default#':
      - '26'
      "yes":
      - "25"
    separatecontext: false
    continueonerrortype: ""
    view: |-
      {
        "position": {
