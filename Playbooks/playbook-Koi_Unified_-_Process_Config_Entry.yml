    type: regular
    task:
      id: c0ffee02-0000-4000-8000-000000000009
      version: -1
      name: Send notification email
      description: Send an email with the script run outcome. Uses the configured send-mail instance when specified, otherwise any enabled mail sender.
      iscommand: true
      brand: ""
      script: '|||send-mail'
      type: regular
    scriptarguments:
      to:
        complex:
          root: inputs.config_entry.notification
          accessor: recipients
          transformers:
          - operator: join
            args:
              separator:
                value:
                  simple: ','
      subject:
        complex:
          root: koi_mail
          accessor: subject
      body:
        complex:
          root: koi_mail
          accessor: body
      using:
        complex:
          root: inputs.config_entry.notification.sendmail_instance
          accessor: name
