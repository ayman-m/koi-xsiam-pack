    taskid: c0ffee02-0000-4000-8000-000000000004
    type: playbook
    task:
      id: c0ffee02-0000-4000-8000-000000000004
      version: -1
      name: Execute the endpoint script
      description: Executes the configured script on the targeted endpoints.
      playbookId: Koi Unified - Execute Endpoint Script
      iscommand: false
      brand: ""
      type: playbook
    scriptarguments:
      script_name:
        simple: ${inputs.config_entry.script.name}
      script_uuid:
        simple: ${inputs.config_entry.script.uuid}
      endpoint_os:
        simple: ${inputs.config_entry.target.endpoint_os}
      endpoint_groups:
        simple: ${inputs.config_entry.target.endpoint_groups}
      endpoint_hostnames:
        simple: ${inputs.config_entry.target.endpoint_hostnames}
      polling_interval_in_seconds:
        simple: ${inputs.config_entry.script.polling_interval_in_seconds}
      timeout_in_seconds:
        simple: ${inputs.config_entry.script.timeout_in_seconds}
    loop:
      iscommand: false
      exitCondition: ""
      max: 100
      wait: 1
    nexttasks:
