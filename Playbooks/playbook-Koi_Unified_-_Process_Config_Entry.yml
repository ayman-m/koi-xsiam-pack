      name: Log skipped entry
      description: Records an informational entry for the skipped configuration entry.
      iscommand: false
      brand: ""
      script: Print
      type: regular
    scriptarguments:
      value:
        simple: 'Koi Script Runner: SKIPPED "${inputs.config_entry.script.name}" — no connected ${inputs.config_entry.target.endpoint_os} endpoints currently match the target scope (groups: ${inputs.config_entry.target.endpoint_groups}, hostnames: ${inputs.config_entry.target.endpoint_hostnames}). Nothing to do this run.'
    nexttasks:
