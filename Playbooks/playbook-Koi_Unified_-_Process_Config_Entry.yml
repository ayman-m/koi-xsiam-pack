  description: 'One entry of the Koi Script Runner configuration. Required nodes: script.name (or script.uuid), target.endpoint_os, and target.endpoint_groups or target.endpoint_hostnames. Optional: disabled, script.polling_interval_in_seconds, script.timeout_in_seconds, notification.recipients, notification.sendmail_instance.name.'
