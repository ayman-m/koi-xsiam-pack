id: KOI - Investigate Device
version: -1
fromversion: 6.10.0
name: KOI - Investigate Device
description: Device-centric KOI investigation. Given a device, lists everything installed (koi-device-inventory-get), flags the items at/above the configured risk level, pulls host remediations, and posts a device posture summary + a risky-items table. Reusable from alert triage (pass KoiContext.device_id / alert_hostname) or standalone. Best-effort.
