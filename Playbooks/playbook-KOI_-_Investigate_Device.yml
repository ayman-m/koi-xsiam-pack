inputs:
- key: device_id
  value: {}
  required: true
  description: The KOI device ID.
  playbookInputQuery: null
- key: hostname
  value: {}
  required: false
  description: The device hostname (for remediation lookup + display).
  playbookInputQuery: null
- key: risk_levels
  value:
    simple: high,critical
  required: false
  description: Comma-separated risk levels to flag.
  playbookInputQuery: null
- key: instance_name
  value:
    simple: KOI_PAET
  required: false
  description: The KOI integration instance.
  playbookInputQuery: null
outputs:
- contextPath: KoiDeviceInv
  description: Device investigation summary object.
  type: unknown
- contextPath: Koi.DeviceInventory
  description: All inventory items on the device.
  type: unknown
tags:
- koi
quiet: false
