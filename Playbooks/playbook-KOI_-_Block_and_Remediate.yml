id: KOI - Block and Remediate
version: -1
fromversion: 6.10.0
name: KOI - Block and Remediate
description: |-
  Response playbook for a flagged KOI item. Enriches the item (KOI - Enrich Item),
  presents an analyst approval gate showing the catalog risk and endpoint exposure,
  and — only on approval — adds the item to the organization-wide KOI blocklist
  (koi-blocklist-items-add). Safe by default: the blocklist write never fires
  without explicit approval.

  Typically chained from KOI - Alert Triage on a Malicious verdict, or run
  manually against an item_id / marketplace.
starttaskid: "0"
tasks:
  "0":
    id: "0"
    taskid: koiblk00-0000-4000-8000-000000000000
    type: start
    task:
      id: koiblk00-0000-4000-8000-000000000000
      version: -1
      name: ""
      iscommand: false
      brand: ""
      type: start
    nexttasks:
      '#none#':
