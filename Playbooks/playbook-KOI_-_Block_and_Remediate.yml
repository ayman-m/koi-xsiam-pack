    taskid: koiblk00-0000-4000-8000-000000000010
    type: condition
    task:
      id: koiblk00-0000-4000-8000-000000000010
      version: -1
      name: Already on the KOI blocklist?
      description: The investigation already pulled the org blocklist - skip a redundant block if this item is on it.
      iscommand: false
      brand: ''
      type: condition
    conditions:
    - label: 'yes'
      condition:
      - - left:
            iscontext: true
            value:
              complex:
                root: Koi.Blocklist
                filters:
                - - left:
                      iscontext: true
                      value:
                        simple: Koi.Blocklist.item_id
                    operator: inList
                    right:
                      iscontext: true
                      value:
                        simple: inputs.item_id
                accessor: item_id
          operator: isNotEmpty
          right:
            value: {}
    nexttasks:
      '#default#':
      - '2'
      'yes':
      - '11'
    separatecontext: false
    continueonerrortype: ''
