      - '8'
    separatecontext: false
    continueonerrortype: ''
    view: "{\n  \"position\": {\n    \"x\": 450,\n    \"y\": 880\n  }\n}"
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  '7':
    id: '7'
    taskid: koiblk00-0000-4000-8000-000000000007
    type: regular
    task:
      id: koiblk00-0000-4000-8000-000000000007
      version: -1
      name: Record block failed
      description: Set a value in context under the key you entered.
      iscommand: false
      brand: ''
      script: SetAndHandleEmpty
      type: regular
    scriptarguments:
      key:
        simple: KoiBlock.status
      value:
        simple: Failed
      append:
        simple: 'false'
    nexttasks:
      '#none#':
      - '8'
    separatecontext: false
    continueonerrortype: ''
    view: "{\n  \"position\": {\n    \"x\": 700,\n    \"y\": 880\n  }\n}"
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  '8':
    id: '8'
    taskid: koiblk00-0000-4000-8000-000000000008
    type: regular
    task:
      id: koiblk00-0000-4000-8000-000000000008
      version: -1
      name: Post response summary
      description: Prints the block outcome to the war room.
      iscommand: false
      brand: ''
      script: Print
      type: regular
    scriptarguments:
      value:
        simple: '## KOI Block & Remediate — ${KoiBlock.status}

          | Field | Value |

          |---|---|

          | Item | ${inputs.item_id} (${inputs.marketplace}) |

          | Outcome | **${KoiBlock.status}** |

          | Catalog risk | ${KoiInvestigation.catalog_risk_level} (score ${KoiInvestigation.catalog_risk_score}) |

          | Org risk / publisher | ${KoiInvestigation.org_risk_level} / ${KoiInvestigation.publisher} |

          | Endpoints affected | ${KoiInvestigation.endpoint_count} |

          | Hostnames | ${KoiInvestigation.hostnames} |

          | Reason | ${inputs.reason} |'
    nexttasks:
