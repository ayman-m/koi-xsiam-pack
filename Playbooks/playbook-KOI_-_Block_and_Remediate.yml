id: KOI - Block and Remediate
version: -1
fromversion: 6.10.0
name: KOI - Block and Remediate
description: 'Response playbook for a flagged KOI item. Enriches the item (KOI - Enrich Item),

  presents an analyst approval gate showing the catalog risk and endpoint exposure,

  and — only on approval — adds the item to the organization-wide KOI blocklist

  (koi-blocklist-items-add). Safe by default: the blocklist write never fires

  without explicit approval.


  Typically chained from KOI - Alert Triage on a Malicious verdict, or run

  manually against an item_id / marketplace.'
starttaskid: '0'
tasks:
  '0':
    id: '0'
    taskid: koiblk00-0000-4000-8000-000000000000
    type: start
    task:
      id: koiblk00-0000-4000-8000-000000000000
      version: -1
      name: ''
      iscommand: false
      brand: ''
      type: start
    nexttasks:
      '#none#':
      - '1'
    separatecontext: false
    continueonerrortype: ''
    view: "{\n  \"position\": {\n    \"x\": 450,\n    \"y\": 50\n  }\n}"
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  '1':
    id: '1'
    taskid: koiblk00-0000-4000-8000-000000000001
    type: playbook
    task:
      id: koiblk00-0000-4000-8000-000000000001
      version: -1
      name: Investigate the item
      description: 'Runs the full KOI investigation: catalog risk + AI summary, org exposure (installs/signing/endpoints/users), governance state, and remediation & approval history.'
      playbookId: KOI - Investigate Item
      iscommand: false
      brand: ''
      type: playbook
    scriptarguments:
      item_id:
        simple: ${inputs.item_id}
      marketplace:
        simple: ${inputs.marketplace}
      version:
        simple: ${inputs.version}
      instance_name:
        simple: ${inputs.instance_name}
    nexttasks:
      '#none#':
      - '10'
    separatecontext: false
    continueonerrortype: ''
    view: "{\n  \"position\": {\n    \"x\": 450,\n    \"y\": 200\n  }\n}"
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  '2':
    id: '2'
    taskid: koiblk00-0000-4000-8000-000000000002
    type: condition
    task:
      id: koiblk00-0000-4000-8000-000000000002
      version: -1
      name: Is approval required?
      description: When auto_block is true the block proceeds without an approval gate; otherwise an analyst must approve.
      iscommand: false
      brand: ''
      type: condition
    conditions:
    - label: auto
      condition:
      - - left:
            iscontext: true
            value:
              simple: inputs.auto_block
          operator: isEqualString
          right:
            value:
              simple: 'true'
    nexttasks:
      '#default#':
      - '3'
      auto:
      - '5'
    separatecontext: false
    continueonerrortype: ''
    view: "{\n  \"position\": {\n    \"x\": 450,\n    \"y\": 370\n  }\n}"
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  '3':
    id: '3'
    taskid: koiblk00-0000-4000-8000-000000000003
    type: condition
    task:
      id: koiblk00-0000-4000-8000-000000000003
      version: -1
      name: Approve blocking this item?
      description: 'Analyst decision. Review the full KOI investigation before approving an organization-wide block.

        Item: ${inputs.item_id} (${inputs.marketplace})

        Catalog risk: ${KoiInvestigation.catalog_risk_level} (score ${KoiInvestigation.catalog_risk_score})

        Org risk: ${KoiInvestigation.org_risk_level} | Publisher: ${KoiInvestigation.publisher} | Signed: ${KoiInvestigation.is_signed}

        Org installs: ${KoiInvestigation.installs_count} | Endpoints affected: ${KoiInvestigation.endpoint_count}

        Hostnames: ${KoiInvestigation.hostnames}

        Affected users: ${KoiInvestigation.affected_users}

        Remediations: ${KoiInvestigation.remediation_count} | Prior approvals: ${KoiInvestigation.approval_count}

        AI risk summary: ${KoiInvestigation.ai_summary}'
      iscommand: false
      brand: ''
      type: condition
    nexttasks:
      Approve:
      - '5'
      Reject:
      - '4'
    separatecontext: false
    continueonerrortype: ''
    view: "{\n  \"position\": {\n    \"x\": 250,\n    \"y\": 540\n  }\n}"
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  '4':
    id: '4'
    taskid: koiblk00-0000-4000-8000-000000000004
    type: regular
    task:
      id: koiblk00-0000-4000-8000-000000000004
      version: -1
      name: Record block rejected
      description: Set a value in context under the key you entered.
      iscommand: false
      brand: ''
      script: SetAndHandleEmpty
      type: regular
    scriptarguments:
      key:
        simple: KoiBlock.status
      value:
        simple: Rejected
      append:
        simple: 'false'
    nexttasks:
      '#none#':
      - '8'
    separatecontext: false
    continueonerrortype: ''
    view: "{\n  \"position\": {\n    \"x\": 60,\n    \"y\": 710\n  }\n}"
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  '5':
    id: '5'
    taskid: koiblk00-0000-4000-8000-000000000005
    type: regular
    task:
      id: koiblk00-0000-4000-8000-000000000005
      version: -1
      name: Add item to KOI blocklist
      description: Adds the item to the organization-wide KOI blocklist.
      iscommand: true
      brand: ''
      script: '|||koi-blocklist-items-add'
      type: regular
    scriptarguments:
      item_id:
        simple: ${inputs.item_id}
      marketplace:
        simple: ${inputs.marketplace}
      created_by:
        simple: ${inputs.created_by}
      notes:
        simple: ${inputs.reason}
      using:
        simple: ${inputs.instance_name}
    nexttasks:
      '#error#':
      - '7'
      '#none#':
      - '6'
    separatecontext: false
    continueonerror: true
    continueonerrortype: errorPath
    view: "{\n  \"position\": {\n    \"x\": 450,\n    \"y\": 710\n  }\n}"
    note: false
    timertriggers: []
    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  '6':
    id: '6'
    taskid: koiblk00-0000-4000-8000-000000000006
    type: regular
    task:
      id: koiblk00-0000-4000-8000-000000000006
      version: -1
      name: Record block succeeded
      description: Set a value in context under the key you entered.
      iscommand: false
      brand: ''
      script: SetAndHandleEmpty
      type: regular
    scriptarguments:
      key:
        simple: KoiBlock.status
      value:
        simple: Blocked
      append:
        simple: 'false'
    nexttasks:
