view: "{\n  \"linkLabelsPosition\": {},\n  \"paper\": {\n    \"dimensions\": {\n      \"height\": 1250,\n      \"width\": 1030,\n      \"x\": 60,\n      \"y\": 50\n    }\n  }\n}"
inputs:
- key: item_id
  value: {}
  required: true
  description: The KOI catalog item ID to block.
  playbookInputQuery: null
- key: marketplace
  value: {}
  required: true
  description: The item's marketplace.
  playbookInputQuery: null
- key: version
  value: {}
  required: false
  description: The item version (optional, for enrichment).
  playbookInputQuery: null
- key: reason
  value: {}
  required: false
  description: Reason/notes recorded with the blocklist entry.
  playbookInputQuery: null
- key: created_by
  value:
    simple: xsoar-koi-response
  required: false
  description: Attribution recorded on the blocklist entry.
  playbookInputQuery: null
- key: auto_block
  value:
    simple: 'false'
  required: false
  description: Set to true to skip the analyst approval gate and block automatically. Default false (approval required).
  playbookInputQuery: null
- key: instance_name
  value:
    simple: KOI_PAET
  required: false
  description: The KOI integration instance to use.
  playbookInputQuery: null
outputs:
- contextPath: KoiBlock.status
  description: The block outcome (Blocked / Rejected / Failed).
  type: string
tags:
- koi
quiet: false
