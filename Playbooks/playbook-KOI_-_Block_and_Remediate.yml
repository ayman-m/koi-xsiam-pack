    ignoreworker: false
    skipunavailable: false
    quietmode: 0
    isoversize: false
    isautoswitchedtoquietmode: false
  "3":
    id: "3"
    taskid: koiblk00-0000-4000-8000-000000000003
    type: condition
    task:
      id: koiblk00-0000-4000-8000-000000000003
      version: -1
      name: Approve blocking this item?
      description: |-
        Analyst decision. Review the enrichment before approving an
        organization-wide block.
        Item: ${inputs.item_id} (${inputs.marketplace})
        Catalog risk: ${KoiEnrichment.risk_level} (score ${KoiEnrichment.risk_score})
        Installed on ${KoiEnrichment.endpoint_count} endpoint(s): ${KoiEnrichment.hostnames}
      iscommand: false
      brand: ""
      type: condition
    nexttasks:
